<!DOCTYPE html>
<html>
<head>
    <title>Spin Wheel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .wheel-container {
            margin-top: 30px;
        }

        #wheel {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    border: 8px solid white;
    margin: auto;
    position: relative;
    overflow: hidden;
        }

.section {
    position: absolute;
    width: 125px;
    height: 125px;
    top: 0;
    left: 0;
    transform-origin: 100% 100%;
    clip-path: polygon(0 0, 100% 0, 100% 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
}

        #spinBtn {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Spin the Wheel 🎡</h1>

    <div class="wheel-container">
        <div id="wheel"></div>
    </div>

    <button class="btn" id="spinBtn" onclick="spin()">SPIN</button>

    <h2 id="result"></h2>
    <a href="index.html" class="btn">Go Home</a>
</div>

<script>
<script>
let options = ["Kiss 💋","Hug 🤗","Slap 😜","Movie 🎬","Date 🍽️","Truth 🤔","Dare 🔥","Song 🎵"];
let colors = ["#ff4d6d","#ff8fa3","#ffb3c1","#ffc2d1","#cdb4db","#a2d2ff","#90dbf4","#8eecf5"];

let wheel = document.getElementById("wheel");
let currentRotation = 0;

for(let i=0;i<options.length;i++){
    let div = document.createElement("div");
    div.className = "section";
    div.style.background = colors[i];
    div.style.transform = "rotate(" + (i*45) + "deg)";
    div.innerHTML = options[i];
    wheel.appendChild(div);
}

function spin(){
    // Reset transition
    wheel.style.transition = "none";
    wheel.style.transform = "rotate(" + currentRotation + "deg)";

    // Force reflow (important)
    wheel.offsetHeight;

    // Fast spin
    wheel.style.transition = "transform 4s cubic-bezier(0.33, 1, 0.68, 1)";
    let extraRotation = Math.floor(2000 + Math.random()*2000);
    currentRotation += extraRotation;
    wheel.style.transform = "rotate(" + currentRotation + "deg)";

    let resultIndex = Math.floor(((currentRotation % 360) / 45));
    
    setTimeout(()=>{
        document.getElementById("result").innerText = "Result: " + options[7 - resultIndex];
    },4000);
}
</script>


</body>
</html>
